name: Release

# Build and publish Linux AppImage + deb on every version tag (e.g. v0.4.0),
# then create a GitHub Release with the artifacts. The auto-updater (electron-updater
# with GitHub provider) checks this release page for new versions.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libgtk-3-dev libwebkit2gtk-4.1-dev \
            libxcb-dri3-0 libxcb-present0 libxshmfence-dev \
            libgbm-dev libxkbcommon-x11-0 libxcomposite-dev \
            libxdamage-dev libxrandr-dev libxtst-dev \
            libnss3 libatk-bridge2.0-0 libdrm2

      - name: Install dependencies
        run: npm ci

      - name: Build Linux release
        run: npm run release:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.AppImage
            dist/*.deb
            dist/*.yml
            dist/*.blockmap

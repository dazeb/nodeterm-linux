name: Sync upstream

# Periodically check the upstream eneskirca/nodeterm repo for new commits
# and open a pull request to merge them into this fork.
on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/eneskirca/nodeterm.git
          git fetch upstream

      - name: Check for new upstream commits
        id: check
        run: |
          UPSTREAM_HEAD=$(git rev-parse upstream/main)
          LOCAL_HEAD=$(git rev-parse HEAD)
          if [ "$UPSTREAM_HEAD" = "$LOCAL_HEAD" ]; then
            echo "up-to-date=true" >> $GITHUB_OUTPUT
            echo "No new upstream commits."
          else
            echo "up-to-date=false" >> $GITHUB_OUTPUT
            echo "New upstream commits found:"
            git log HEAD..upstream/main --oneline
          fi

      - name: Create or update sync PR
        if: steps.check.outputs.up-to-date == 'false'
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_TITLE="chore: sync upstream changes"
          PR_BODY=$(cat <<'EOF'
          This PR merges the latest changes from [upstream](https://github.com/eneskirca/nodeterm).

          **Before merging:**
          - [ ] Run `npm run typecheck` locally
          - [ ] Run `npm test` to verify tests pass
          - [ ] Build with `npm run dist:linux` to verify packaging
          - [ ] Check for any conflicts with fork-specific changes (license removal, Telegram bot, Linux build)

          > Auto-generated by `.github/workflows/sync-upstream.yml`
          EOF
          )

          # Check if a sync PR already exists
          EXISTING=$(gh pr list --head upstream-sync --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            echo "Updating existing PR #$EXISTING..."
            gh pr edit "$EXISTING" --title "$PR_TITLE" --body "$PR_BODY"
            # Update the branch by force-pushing the merge
            git checkout -b upstream-sync
            git merge upstream/main --no-edit --no-ff 2>/dev/null || true
            git push origin upstream-sync --force
          else
            echo "Creating new PR..."
            git checkout -b upstream-sync
            git merge upstream/main --no-edit --no-ff 2>/dev/null || true
            git push origin upstream-sync
            gh pr create \
              --title "$PR_TITLE" \
              --body "$PR_BODY" \
              --head upstream-sync \
              --base main \
              --label "upstream"
          fi
